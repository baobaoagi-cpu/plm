name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy
      - name: Unit tests
        run: uv run pytest tests/unit

